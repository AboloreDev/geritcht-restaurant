<!doctype html>
<html>
  <head>
    <title>Geritcht Restaurant API Documentation</title>
    <meta charset="utf-8" />
    <script
      type="module"
      src="https://unpkg.com/rapidoc/dist/rapidoc-min.js"
    ></script>
    <style>
      body {
        margin: 0;
        padding: 0;
      }
    </style>
  </head>
  <body>
    <rapi-doc
      spec-url="/docs/doc.json"
      server-url="https://geritcht-restaurant.onrender.com/api/v1"
      theme="dark"
      bg-color="#0d0d0d"
      text-color="#f5f5f5"
      header-color="#171717"
      primary-color="#d4af37"
      nav-bg-color="#141414"
      nav-text-color="#f5f5f5"
      nav-hover-bg-color="#222222"
      nav-hover-text-color="#d4af37"
      nav-accent-color="#d4af37"
      render-style="focused"
      schema-style="table"
      default-schema-tab="schema"
      show-header="true"
      show-info="true"
      allow-authentication="true"
      allow-server-selection="true"
      allow-api-list-style-selection="false"
      show-components="true"
      sort-tags="true"
      goto-path=""
      fill-request-fields-with-example="true"
      persist-auth="true"
      use-path-in-nav-bar="false"
    >
      <div slot="logo" style="display: flex; align-items: center; color: white">
        <div style="margin-left: 7px; font-size: 20px; font-weight: bold">
          Geritcht Restaurant API
        </div>
      </div>
    </rapi-doc>
  </body>
</html>
