host: localhost:9090
info:
  contact:
    email: alabifathiu@yahoo.com
    name: Alabi Fathiu
    url: http://linkedin.com/in/fathiu-alabi
  description: A modern Restaurant API built with Go, Gin, and GORM
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: Geritcht Restaurant API
  version: "1.0"
paths:
  /allergens:
    get:
      consumes:
      - application/json
      description: Retrieve a paginated list of all allergens.
      parameters:
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 10
        description: Number of items per page
        in: query
        name: pageSize
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Allergens retrieved successfully
          schema:
            allOf:
            - $ref: '#/definitions/github_com_AboloreDev_geritcht-restaurant_internals_utils.PaginatedResponse'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/github_com_AboloreDev_geritcht-restaurant_internals_dto.AllergenResponse'
                  type: array
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_AboloreDev_geritcht-restaurant_internals_utils.Response'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/github_com_AboloreDev_geritcht-restaurant_internals_utils.Response'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/github_com_AboloreDev_geritcht-restaurant_internals_utils.Response'
      security:
      - BearerAuth: []
      summary: List allergens
      tags:
      - Allergens
    post:
      consumes:
      - application/json
      description: Create a new allergen. Admin access required.
      parameters:
      - description: Allergen details
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/github_com_AboloreDev_geritcht-restaurant_internals_dto.CreateAllergenRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Allergen created successfully
          schema:
            allOf:
            - $ref: '#/definitions/github_com_AboloreDev_geritcht-restaurant_internals_utils.Response'
            - properties:
                data:
                  $ref: '#/definitions/github_com_AboloreDev_geritcht-restaurant_internals_dto.AllergenResponse'
              type: object
        "400":
          description: Invalid request data
          schema:
            $ref: '#/definitions/github_com_AboloreDev_geritcht-restaurant_internals_utils.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_AboloreDev_geritcht-restaurant_internals_utils.Response'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/github_com_AboloreDev_geritcht-restaurant_internals_utils.Response'
        "409":
          description: Allergen already exists
          schema:
            $ref: '#/definitions/github_com_AboloreDev_geritcht-restaurant_internals_utils.Response'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/github_com_AboloreDev_geritcht-restaurant_internals_utils.Response'
      security:
      - BearerAuth: []
      summary: Create an allergen
      tags:
      - Allergens
  /allergens/{id}:
    delete:
      consumes:
      - application/json
      description: Delete an allergen by its ID. Admin access required.
      parameters:
      - description: Allergen ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Allergen deleted successfully
          schema:
            $ref: '#/definitions/github_com_AboloreDev_geritcht-restaurant_internals_utils.Response'
        "400":
          description: Invalid allergen ID
          schema:
            $ref: '#/definitions/github_com_AboloreDev_geritcht-restaurant_internals_utils.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_AboloreDev_geritcht-restaurant_internals_utils.Response'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/github_com_AboloreDev_geritcht-restaurant_internals_utils.Response'
        "404":
          description: Allergen not found
          schema:
            $ref: '#/definitions/github_com_AboloreDev_geritcht-restaurant_internals_utils.Response'
        "409":
          description: Allergen cannot be deleted because it is in use
          schema:
            $ref: '#/definitions/github_com_AboloreDev_geritcht-restaurant_internals_utils.Response'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/github_com_AboloreDev_geritcht-restaurant_internals_utils.Response'
      security:
      - BearerAuth: []
      summary: Delete an allergen
      tags:
      - Allergens
    patch:
      consumes:
      - application/json
      description: Update an existing allergen. Admin access required.
      parameters:
      - description: Allergen ID
        in: path
        name: id
        required: true
        type: integer
      - description: Updated allergen details
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/github_com_AboloreDev_geritcht-restaurant_internals_dto.UpdateAllergenRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Allergen updated successfully
          schema:
            allOf:
            - $ref: '#/definitions/github_com_AboloreDev_geritcht-restaurant_internals_utils.Response'
            - properties:
                data:
                  $ref: '#/definitions/github_com_AboloreDev_geritcht-restaurant_internals_dto.AllergenResponse'
              type: object
        "400":
          description: Invalid request data or allergen ID
          schema:
            $ref: '#/definitions/github_com_AboloreDev_geritcht-restaurant_internals_utils.Response'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_AboloreDev_geritcht-restaurant_internals_utils.Response'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/github_com_AboloreDev_geritcht-restaurant_internals_utils.Response'
        "404":
          description: Allergen not found
          schema:
            $ref: '#/definitions/github_com_AboloreDev_geritcht-restaurant_internals_utils.Response'
        "409":
